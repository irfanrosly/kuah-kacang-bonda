<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="50%" stop-color="#F5E6D0"/>
      <stop offset="100%" stop-color="#E8D5B8"/>
    </linearGradient>
    <linearGradient id="jarBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D1500"/>
      <stop offset="15%" stop-color="#3D1A00"/>
      <stop offset="50%" stop-color="#4A2010"/>
      <stop offset="85%" stop-color="#3D1A00"/>
      <stop offset="100%" stop-color="#2D1500"/>
    </linearGradient>
    <linearGradient id="jarShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F0" stop-opacity="0.12"/>
      <stop offset="30%" stop-color="#FFF8F0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFF8F0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C73B1E"/>
      <stop offset="100%" stop-color="#8B2500"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D44A2E"/>
      <stop offset="50%" stop-color="#C73B1E"/>
      <stop offset="100%" stop-color="#A02F15"/>
    </linearGradient>
    <filter id="jarShadow">
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#1A0A00" flood-opacity="0.2"/>
    </filter>
    <filter id="spill">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Table surface -->
  <rect x="0" y="480" width="600" height="120" fill="#E8D5B8" opacity="0.5"/>
  <!-- Jar shadow on table -->
  <ellipse cx="310" cy="490" rx="110" ry="18" fill="#1A0A00" opacity="0.12" filter="url(#spill)"/>
  <!-- Jar body -->
  <rect x="210" y="195" width="180" height="290" rx="15" fill="url(#jarBody)" filter="url(#jarShadow)"/>
  <!-- Jar shine/reflection -->
  <rect x="215" y="200" width="170" height="280" rx="12" fill="url(#jarShine)"/>
  <!-- Label -->
  <rect x="220" y="230" width="160" height="160" rx="10" fill="url(#labelGrad)"/>
  <rect x="225" y="235" width="150" height="150" rx="8" fill="#8B2500"/>
  <!-- Label decorative border -->
  <rect x="230" y="240" width="140" height="140" rx="6" fill="none" stroke="#E8A87C" stroke-width="1" opacity="0.4"/>
  <!-- Label text -->
  <text x="300" y="275" font-family="Georgia, serif" font-size="15" fill="#E8A87C" text-anchor="middle" font-weight="bold" letter-spacing="3">RESEPI</text>
  <text x="300" y="300" font-family="Georgia, serif" font-size="20" fill="#FFF8F0" text-anchor="middle" font-weight="bold" letter-spacing="2">BONDA</text>
  <line x1="260" y1="310" x2="340" y2="310" stroke="#E8A87C" stroke-width="0.5" opacity="0.5"/>
  <text x="300" y="335" font-family="Arial, sans-serif" font-size="11" fill="#FFF8F0" text-anchor="middle" opacity="0.85">Kuah Kacang</text>
  <text x="300" y="355" font-family="Arial, sans-serif" font-size="16" fill="#E8A87C" text-anchor="middle" font-weight="bold">500g</text>
  <!-- Label small decorative elements -->
  <circle cx="250" cy="250" r="3" fill="#E8A87C" opacity="0.3"/>
  <circle cx="350" cy="250" r="3" fill="#E8A87C" opacity="0.3"/>
  <circle cx="250" cy="370" r="3" fill="#E8A87C" opacity="0.3"/>
  <circle cx="350" cy="370" r="3" fill="#E8A87C" opacity="0.3"/>
  <!-- Sauce visible through glass (bottom) -->
  <rect x="215" y="420" width="170" height="55" rx="5" fill="#C78B3E" opacity="0.3"/>
  <!-- Cap -->
  <rect x="235" y="165" width="130" height="35" rx="8" fill="url(#capGrad)"/>
  <rect x="245" y="170" width="110" height="6" rx="3" fill="#FFF8F0" opacity="0.1"/>
  <!-- Cap top shine -->
  <rect x="260" y="170" width="80" height="4" rx="2" fill="#FFF8F0" opacity="0.08"/>
  <!-- Small sauce drop on rim -->
  <ellipse cx="380" cy="200" rx="3" ry="2" fill="#C78B3E" opacity="0.25" transform="rotate(30 380 200)"/>
</svg>